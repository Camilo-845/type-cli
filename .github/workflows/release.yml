name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/tpg-${GOOS}-${GOARCH} .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tpg-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/tpg-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten dist
        run: |
          mkdir -p flat
          find dist -type f -name 'tpg-*' -exec cp {} flat/ \;

      - uses: softprops/action-gh-release@v2
        with:
          files: flat/*
          generate_release_notes: true
