name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          CGO_ENABLED=0 go build -buildmode=pie -ldflags="-s -w" -o "dist/tcli-${GOOS}-${GOARCH}${EXT}" .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tcli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/tcli-${{ matrix.goos }}-${{ matrix.goarch }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten dist
        run: |
          mkdir -p flat
          find dist -type f -name 'tcli-*' -exec cp {} flat/ \;

      - uses: softprops/action-gh-release@v2
        with:
          files: flat/*
          generate_release_notes: true
